<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaperTrader — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#080c14;--bg2:#0d1424;--bg3:#111b2e;
      --border:#1a2540;--text:#e4eaf5;--text2:#7a8fad;--text3:#3d5070;
      --accent:#3b82f6;--accent2:#60a5fa;--green:#22d3a5;--red:#f4677a;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
    body::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.07) 0%,transparent 70%);top:-200px;left:-200px;pointer-events:none}
    body::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(34,211,165,0.05) 0%,transparent 70%);bottom:-100px;right:-100px;pointer-events:none}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:44px 40px;width:420px;position:relative;z-index:1}
    .logo{font-family:'IBM Plex Mono',monospace;font-size:24px;color:var(--accent2);margin-bottom:6px;letter-spacing:-0.5px}
    .logo span{color:var(--text3)}
    .tagline{font-size:13px;color:var(--text2);margin-bottom:32px}
    .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px}
    .tab{padding:8px 20px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
    .tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}
    .form-group{margin-bottom:16px}
    .form-group label{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase}
    .form-group input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:14px;font-family:'Syne',sans-serif;outline:none;transition:border-color .15s}
    .form-group input:focus{border-color:var(--accent)}
    .submit-btn{width:100%;background:var(--accent);color:#fff;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;margin-top:8px;transition:background .15s}
    .submit-btn:hover{background:var(--accent2)}
    .error-msg{font-size:12px;color:var(--red);margin-top:12px;min-height:18px;text-align:center}
    .form-section{display:none}
    .form-section.active{display:block}
    .features{margin-top:28px;padding-top:20px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .feature{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
    .feature::before{content:'✓';color:var(--green);font-weight:700}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Paper<span>/</span>Trader</div>
    <div class="tagline">Trade stocks with $100,000 virtual cash. Zero risk.</div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Sign In</div>
      <div class="tab" onclick="switchTab('register')">Register</div>
    </div>

    <!-- LOGIN -->
    <div id="loginForm" class="form-section active">
      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="action" value="login" />
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="your_username" required autofocus />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="submit-btn">Sign In</button>
      </form>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="form-section">
      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="action" value="register" />
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="choose_a_username" required />
        </div>
        <div class="form-group">
          <label>Email (optional)</label>
          <input type="email" name="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="min 6 characters" required />
        </div>
        <button type="submit" class="submit-btn">Create Account</button>
      </form>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <div class="features">
      <div class="feature">$100,000 virtual cash</div>
      <div class="feature">Live stock prices</div>
      <div class="feature">Portfolio tracking</div>
      <div class="feature">Trade history</div>
      <div class="feature">Growth charts</div>
      <div class="feature">P&amp;L analytics</div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
      document.getElementById('loginForm').classList.toggle('active', tab==='login');
      document.getElementById('registerForm').classList.toggle('active', tab==='register');
    }
  </script>
</body>
</html>
